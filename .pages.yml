media:
  input: images
  output: /images
  extensions: [jpg, jpeg, png, webp, gif]
  categories: [image]

content:
  - name: photos
    label: Fotos
    type: file
    path: photos.json
    description: "So verwaltest du alle Fotos: Neues Foto = unten auf „Add an entry“. Reihenfolge ändern = Eintrag am Griff (⋮⋮) ziehen. Löschen = Mülleimer-Symbol. Ganz oben rechts auf „Save“ tippen – nach ca. 1 Minute ist alles live."
    fields:
      - name: items
        label: Fotos
        type: object
        list: true
        fields:
          - name: image
            label: Foto
            type: image
            required: true
            description: "Foto hochladen – am Handy direkt aus der Galerie."
          - name: category
            label: Reiter / Kategorie
            type: select
            description: "In welchem Reiter der Website soll das Foto erscheinen?"
            options:
              values:
                - { name: events, label: Events }
                - { name: portraits, label: Portraits }
                - { name: jewelry, label: Jewelry (Schmuck) }
                - { name: branding, label: Branding }
                - { name: design, label: Design }
                - { name: visuals, label: Visuals }
                - { name: references, label: Referenzen / Case Study }
          - name: title
            label: Titel (erscheint unter dem Foto)
            type: string
          - name: featured
            label: "Auf der Startseite (Highlights) zeigen"
            type: boolean
          - name: video
            label: "Video-Link (YouTube oder Vimeo) - optional"
            type: string
            description: "Wenn ausgefüllt, wird beim Antippen statt des Fotos das Video abgespielt. Das Foto dient dann als Vorschaubild."

  - name: texts
    label: Texte & Überschriften
    type: file
    path: content.json
    description: "Hier änderst du alle Texte der Website. Tipp: Ein Wort in *Sternchen* setzen → es erscheint in der eleganten Kursiv-Schrift, z. B. Selected *Work*."
    fields:
      - name: brandName
        label: Name oben links
        type: string
      - name: brandSub
        label: Untertitel (klein, unter dem Namen)
        type: string
      - name: heroEyebrow
        label: Startseite – kleine Zeile über dem Titel
        type: string
      - name: heroTitle
        label: Startseite – großer Titel (jede Zeile in eine eigene Zeile, *Wort* = kursiv)
        type: text
      - name: heroLead
        label: Startseite – Untertitel-Absatz
        type: text
      - name: heroMeta1
        label: Startseite – kleiner Hinweis 1
        type: string
      - name: heroMeta2
        label: Startseite – kleiner Hinweis 2
        type: string
      - name: workTitle
        label: Bereich „Arbeiten“ – Überschrift (*Wort* = kursiv)
        type: string
      - name: aboutEyebrow
        label: Über mich – kleine Zeile
        type: string
      - name: aboutTitle
        label: Über mich – Überschrift (*Wort* = kursiv)
        type: string
      - name: aboutText1
        label: Über mich – Absatz 1
        type: text
      - name: aboutText2
        label: Über mich – Absatz 2
        type: text
      - name: aboutTags
        label: Über mich – Stichworte (mit Komma getrennt)
        type: text
      - name: contactEyebrow
        label: Kontakt – kleine Zeile
        type: string
      - name: contactTitle
        label: Kontakt – Überschrift (*Wort* = kursiv)
        type: string
      - name: footerRight
        label: Fußzeile – Text rechts
        type: string

  - name: settings
    label: Kontakt & Medien
    type: file
    path: settings.json
    description: "Kontaktdaten und Social-Media-Links. Diese erscheinen im Kontaktbereich der Website."
    fields:
      - name: about
        label: Über-mich-Foto
        type: image
      - name: email
        label: Kontakt-E-Mail
        type: string
      - name: instagram
        label: Instagram-Link
        type: string
      - name: behance
        label: Behance-Link
        type: string
      - name: linkedin
        label: LinkedIn-Link
        type: string
